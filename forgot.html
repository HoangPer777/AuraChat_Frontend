        body {

<body class="bg-custom-gradient min-h-screen flex items-center justify-center p-gutter">
<!-- Container for Forget Password Flow (Transactional Page - Shell Suppressed) -->
<main class="w-full max-w-[480px] animate-fade-in">
<!-- Branding Identity (Abstract Logo) -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center shadow-lg mb-4">
<span class="material-symbols-outlined text-white text-4xl" data-icon="chat">chat</span>
</div>
<h2 class="font-h1-display text-h1-display text-primary tracking-tight">AuraChat</h2>
</div>
<!-- Main Card -->
<div class="glass-card shadow-[0_4px_12px_rgba(0,0,0,0.05)] rounded-2xl p-10 border border-white">
<!-- Top Section: Icon & Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-low mb-6">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="mail">mail</span>
</div>
<h1 class="font-h1-display text-h1-display text-on-surface mb-3">Quên mật khẩu?</h1>
<p class="font-body-main text-body-main text-on-surface-variant max-w-[320px] mx-auto">
                    Nhập email của bạn, chúng tôi sẽ gửi mã OTP để đặt lại mật khẩu.
                </p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">Địa chỉ email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface border border-outline-variant rounded-[12px] font-body-main text-body-main text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" placeholder="username@example.com" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="btn-primary-gradient w-full py-4 rounded-[12px] text-white font-body-bold text-body-bold shadow-md hover:shadow-lg hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span>Gửi mã OTP</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 font-body-bold text-body-bold text-primary-container hover:text-primary transition-colors cursor-pointer" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
<span>Quay lại đăng nhập</span>
</a>
</div>
</div>
<!-- Decorative Illustration Element -->
<div class="mt-12 flex justify-center opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
<img alt="AuraChat Secure Messaging" class="w-48 h-auto object-contain rounded-xl" data-alt="A clean, high-key digital illustration of a secure workspace with floating violet chat bubbles and holographic shield icons. The scene is bathed in a soft lavender light-mode glow, emphasizing a feeling of safety and professional communication. Thin white lines and subtle gradients create a modern glassmorphism aesthetic that matches the AuraChat brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA-v8Yx5XWLX34ul6DWW5chxMT4-7L5KCIMxMoAwvMSIcb12zhJhwJY4yxmrTG01UTu4Qtg_7ggt3Y6QZyU_aIUrbKc0Mn1OxoiCy792De94JAEnG0EUwq-foYDq_UznSuES43rjQM61JRjus8dhAEzuty1DL4ENq_z1-A5PC8FdoJqYiS7LVGifD5kRyT-DWZ7qPILtpJtcpGiO8bauaSCyibtaYghux01SI6Z5TV3Z6QT32SQs_OdDFTig8qbaNL_defQYr5hh3sm"/>

<p class="font-caption text-caption text-outline">

            </p>
