deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./*"
          target: /home/${{ secrets.USERNAME }}/project-fe
          rm: true # Xóa code cũ để tránh xung đột file

      - name: Deploy with docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.USERNAME }}/project-fe
            
            # Khởi tạo file .env
            cat > .env <<'EOF'
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF

            # Cách 2: Tắt Buildkit để tránh lỗi Buildx version quá cũ
            # Chúng ta sẽ thử docker-compose trước vì nó thường ổn định hơn trên server cũ
            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0

            if command -v docker-compose >/dev/null 2>&1; then
              echo "Using docker-compose..."
              docker-compose up -d --build
            else
              echo "Using docker compose..."
              docker compose up -d --build
            fi