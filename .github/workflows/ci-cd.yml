name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: project-fe:ci

  docker-compose:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run docker compose
        run: |
          docker compose up -d --build

      - name: Show containers
        run: docker compose ps

      - name: Tear down
        if: always()
        run: docker compose down --volumes

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: /home/${{ secrets.USERNAME }}/project-fe
          rm: true

      - name: Deploy with docker compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.USERNAME }}/project-fe
            
            # Ghi file môi trường và ÉP THÊM BIẾN BACKEND_URL cho Nginx
            cat > .env <<'EOF'
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF
            
            # Khai báo biến môi trường chỉ định IP Gateway nội bộ cho Nginx xử lý
            echo "" >> .env
            echo "BACKEND_URL=http://172.17.0.1:8080" >> .env
            # Dùng relative path để tránh Mixed Content khi deploy HTTPS
            echo "VITE_API_BASE_URL=/api" >> .env

            # TẮT BUILDKIT: Ép Docker dùng bộ build truyền thống
            export DOCKER_BUILDKIT=0
            export COMPOSE_DOCKER_CLI_BUILD=0

            echo "Cưỡng ép dọn dẹp container cũ để xóa bỏ hoàn toàn xung đột mạng..."
            docker rm -f aurachat-frontend 2>/dev/null || true

            # Build image thủ công (tránh lỗi buildx version cũ)
            DOCKER_BUILDKIT=0 docker build -t project-fe-frontend .

            # Chạy container mới
            docker run -d \
              --name aurachat-frontend \
              --restart unless-stopped \
              -p 80:80 \
              -e BACKEND_URL=http://172.17.0.1:8080/ \
              project-fe-frontend

            # Dọn dẹp các ảnh thừa sau khi build để tránh đầy ổ cứng server
            docker image prune -f