services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=https://aura-chat.io.vn
      - VITE_WS_URL=wss://aura-chat.io.vn
      - BACKEND_URL=http://aurachat-backend:8080
    # Thêm đoạn cấu hình network này vào:
    networks:
      - aurachat-net

networks:
  aurachat-net:
    external: true
    name: aurachat-network