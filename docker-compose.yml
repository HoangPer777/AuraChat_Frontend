version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://32.193.155.80}
      - VITE_WS_URL=${VITE_WS_URL:-ws://32.193.155.80}
      - BACKEND_URL=${BACKEND_URL:-http://32.193.155.80:8080}
    