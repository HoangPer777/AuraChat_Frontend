services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://aura-chat.io.vn}
      - VITE_WS_URL=${VITE_WS_URL:-wss://aura-chat.io.vn}
      # Dev local: backend chạy trên máy host
      # Deploy production: trỏ về domain backend đã có HTTPS
      - BACKEND_URL=${BACKEND_URL:-https://aura-chat.io.vn}
