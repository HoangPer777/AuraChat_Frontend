services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://host.docker.internal:8080}
    
