services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://aura-chat.io.vn:8080
      - VITE_WS_URL=ws://aura-chat.io.vn:8080
      # Dev local: backend chạy trên máy host
      # Deploy production: trỏ về domain backend đã có HTTPS
      - BACKEND_URL=http://aura-chat.io.vn:8080
