services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "80:80"   # <--- Đổi số 3000 thành số 80 ở đây
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://aura-chat.io.vn}
      - VITE_WS_URL=${VITE_WS_URL:-wss://aura-chat.io.vn}
      - BACKEND_URL=${BACKEND_URL:-http://aurachat-backend:8080}  # Nếu dùng chung mạng docker network với backend