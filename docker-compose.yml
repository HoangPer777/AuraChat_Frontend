services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
      - VITE_WS_URL=${VITE_WS_URL:-ws://32.195.171.12}
      - BACKEND_URL=${BACKEND_URL:-http://32.195.171.12:8080}
