services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8080}
      # Dev local: backend chạy trên máy host
      # Deploy production: đổi thành http://<server-ip>:8080 hoặc https://api.yourdomain.com
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8080}
