version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurachat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://aura-chat.io.vn}
      - VITE_WS_URL=${VITE_WS_URL:-ws://aura-chat.io.vn}
      - BACKEND_URL=${BACKEND_URL:-http://aura-chat.io.vn:8080}
    