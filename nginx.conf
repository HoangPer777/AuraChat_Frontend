server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. React Router - Hỗ trợ các route ảo của React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. Proxy WebSocket - match /ws và mọi path con /ws/...
    location ^~ /ws {
        proxy_pass ${BACKEND_URL}/ws;
        proxy_http_version 1.1;

        # Bắt buộc để WebSocket upgrade hoạt động
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tắt buffering cho WebSocket
        proxy_buffering off;

        # WebSocket cần timeout dài để không bị ngắt kết nối giữa chừng
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}