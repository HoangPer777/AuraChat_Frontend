server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Firebase popup auth requires these COOP/COEP headers
    add_header Cross-Origin-Opener-Policy "unsafe-none" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    # 1. React Router - Hỗ trợ các route ảo của React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests
    location /api/ {
        # envsubst sẽ tự động thay thế biến này thành http://172.17.0.1:8080/ khi container chạy
        # Giữ nguyên /api/ prefix khi forward đến Backend
        proxy_pass ${BACKEND_URL}/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. Proxy WebSocket - native STOMP endpoint /ws
    location ^~ /ws {
        proxy_pass ${BACKEND_URL}/ws;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}
