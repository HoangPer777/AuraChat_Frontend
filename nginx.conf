server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. React Router - Hỗ trợ các route ảo của React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests
    location /api/ {
        # envsubst sẽ tự động thay thế biến này thành http://172.17.0.1:8080/ khi container chạy
        # Giữ nguyên /api/ prefix khi forward đến Backend
        proxy_pass ${BACKEND_URL}api/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng timeout để tránh lỗi 504 nếu BE xử lý lâu
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. Proxy WebSocket (Rất quan trọng cho AuraChat)
    # Match mọi path con của /ws/ do SockJS tạo ra: /ws/{server}/{session}/websocket
    location ^~ /ws/ {
        proxy_pass ${BACKEND_URL}ws/;
        proxy_http_version 1.1;

        # Bắt buộc để WebSocket upgrade hoạt động
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Báo cho BE biết client đang dùng HTTPS/WSS
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Tắt buffering cho WebSocket
        proxy_buffering off;

        # WebSocket cần timeout dài để không bị ngắt kết nối giữa chừng
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }
}