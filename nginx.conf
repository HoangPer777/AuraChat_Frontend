server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. React Router - Hỗ trợ các route ảo của React
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests
    location /api/ {
        # Thêm dấu / ở cuối biến để Nginx strip (cắt) chữ /api/ trước khi gửi đến Backend
        # Ví dụ: FE gọi /api/login -> BE nhận /login
        proxy_pass ${BACKEND_URL}/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng timeout để tránh lỗi 504 nếu BE xử lý lâu
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 3. Proxy WebSocket (Rất quan trọng cho AuraChat)
    location /ws/ {
        proxy_pass ${BACKEND_URL}/ws/; # Đảm bảo khớp với path socket của BE
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # WebSocket cần timeout dài để không bị ngắt kết nối giữa chừng
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}